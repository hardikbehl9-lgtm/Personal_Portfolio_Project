<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Hardik</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" role="banner">
    <div class="logo"><a href="index.html">H.</a></div>
    <nav aria-label="Main Navigation">
      <ul class="nav-links">
        <li><a href="index.html">Work</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content" style="padding-top: 120px; max-width: 600px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem;">
    <section class="bento-card" aria-label="Contact Form">
      <h2 style="margin-bottom: 0.5rem;">Get In Touch</h2>
      <p style="opacity: 0.8; margin-bottom: 2rem;">Feel free to reach out for collaborations or opportunities.</p>
      
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        
        <button type="submit" class="bento-link" style="border: none; cursor: pointer; font-family: inherit; font-size: 1rem; width: 100%;">Send Message</button>
      </form>
    </section>
  </main>

</body>
</html>
